<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madina &#128149; gito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #ff7eb3;
        --pink-deep: #e23e7a;
        --pink-soft: #ffd6e8;
        --cream: #fff5fa;
        --ink: #5b2740;
        --gold: #ffd36e;
        --shadow: 0 8px 24px rgba(226, 62, 122, 0.35);
        --pix: "Press Start 2P", monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        min-height: 100%;
        font-family: "Trebuchet MS", "Comic Sans MS", system-ui, sans-serif;
        color: var(--ink);
      }

      body {
        background:
          radial-gradient(circle at 20% 15%, #fff 0, transparent 30%),
          radial-gradient(circle at 80% 85%, #fff 0, transparent 30%),
          linear-gradient(160deg, #ffd6e8 0%, #ffb3d1 45%, #b6f0c9 120%);
        background-attachment: fixed;
      }

      /* ---------- Hero ---------- */
      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 70px 20px 90px;
        min-height: calc(100vh - 60px);
      }
      .hero-title {
        font-family: var(--pix);
        font-size: clamp(1.4rem, 5vw, 3rem);
        color: var(--pink-deep);
        line-height: 1.5;
        text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(226, 62, 122, 0.25);
      }
      .hero-sub {
        margin-top: 22px;
        font-size: 1.1rem;
        max-width: 520px;
        opacity: 0.85;
        line-height: 1.6;
      }

      .game-card {
        margin-top: 48px;
        display: inline-block;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.85);
        border: 4px solid #fff;
        border-radius: 28px;
        padding: 34px 40px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .game-card:hover {
        transform: translateY(-6px) scale(1.02);
        box-shadow: 0 14px 34px rgba(226, 62, 122, 0.45);
      }
      .game-emoji { font-size: 3.4rem; }
      .game-name {
        font-family: var(--pix);
        font-size: 1rem;
        color: var(--pink-deep);
        margin-top: 16px;
      }
      .game-go {
        display: inline-block;
        margin-top: 18px;
        font-family: var(--pix);
        font-size: 0.7rem;
        color: #fff;
        background: var(--pink-deep);
        padding: 12px 20px;
        border-radius: 14px;
        box-shadow: 0 4px 0 #b81d57;
      }

      @media (max-width: 520px) {
        .nav { gap: 10px; padding: 12px 16px; }
        .nav-brand { font-size: 0.62rem; }
        .nav-links { gap: 2px; }
        .nav-link { font-size: 0.5rem; padding: 8px 8px; }
      }
    </style>
  </head>
  <body>
    <!-- Hero -->
    <main class="hero" id="home">
      <h1 class="hero-title">Hey Madina &#128149;</h1>
      <p class="hero-sub">
        gito made a little world just for you. Pick a door from the menu above
        &mdash; the kitties are waiting to play!
      </p>

      <a class="game-card" href="Kitty-Defens/pages/index.html">
        <div class="game-emoji">&#128049;</div>
        <div class="game-name">KITTY DEFENSE</div>
        <span class="game-go">&#9654; PLAY NOW</span>
      </a>
    </main>
  </body>
</html>
