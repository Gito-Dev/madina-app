<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Hello Kitty vs Zombies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Press Start 2P", monospace;
        background: #14121c;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      .home {
        position: fixed;
        inset: 0;
        background: url("../Assets/effects/kitty-zombie-home.webp") no-repeat center / cover;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      /* darken the bottom so the button pops */
      .home::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 55%, rgba(10, 8, 16, 0.75));
        pointer-events: none;
      }

      .back {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 3;
        font-size: 0.55rem;
        color: #fff;
        text-decoration: none;
        background: rgba(226, 62, 122, 0.9);
        border: 2px solid #fff;
        padding: 9px 12px;
        border-radius: 10px;
        box-shadow: 0 3px 0 #b81d57;
      }

      .play {
        position: relative;
        z-index: 3;
        margin-bottom: 9vh;
        font-family: inherit;
        font-size: 1.1rem;
        color: #fff;
        text-decoration: none;
        background: linear-gradient(180deg, #ff8fc0, #e23e7a);
        border: 4px solid #fff;
        padding: 20px 46px;
        border-radius: 18px;
        box-shadow: 0 7px 0 #b81d57, 0 12px 26px rgba(0, 0, 0, 0.5);
        text-shadow: 2px 2px 0 #b81d57;
        animation: pulse 1.1s ease-in-out infinite;
      }
      .play:active { transform: translateY(5px); box-shadow: 0 2px 0 #b81d57, 0 6px 16px rgba(0,0,0,.5); }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }

      .tip {
        position: fixed;
        bottom: 14px;
        left: 0;
        right: 0;
        z-index: 3;
        text-align: center;
        font-size: 0.45rem;
        color: #ffd6e8;
        opacity: 0.85;
        text-shadow: 0 2px 3px #000;
      }
    </style>
  </head>
  <body>
    <div class="home">
      <a class="back" href="../../Home.html">&#8592; Home</a>
      <a class="play" href="index.html">&#9654; PLAY</a>
      <p class="tip">Left stick to walk &bull; Right stick &amp; button to shoot</p>
    </div>
  </body>
</html>
