<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Hello Kitty Arcade &#128149;</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pix: "Press Start 2P", monospace;
        --pink: #ff7eb3;
        --pink-deep: #e23e7a;
        --cyan: #5ef1ff;
        --mint: #7CFC00;
        --purple: #c08bff;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: var(--pix);
        background: #140a1e;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      .arcade {
        position: fixed;
        inset: 0;
        background: url("arcade-home.png") no-repeat center / cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding: 0 16px 5vh;
      }
      /* darken the floor so buttons read clearly */
      .arcade::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(10, 6, 18, 0.82));
        pointer-events: none;
      }

      .pick {
        position: relative;
        z-index: 2;
        font-size: 0.6rem;
        color: #fff;
        text-shadow: 0 0 8px var(--pink), 0 2px 4px #000;
        margin-bottom: 22px;
        letter-spacing: 1px;
        animation: blink 1.1s steps(2, start) infinite;
      }
      @keyframes blink { 50% { opacity: 0.35; } }

      .machines {
        position: relative;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        gap: 26px;
        justify-content: center;
      }

      .machine {
        width: 250px;
        text-decoration: none;
        text-align: center;
        padding: 22px 20px 18px;
        border-radius: 16px;
        background: rgba(18, 8, 30, 0.66);
        backdrop-filter: blur(2px);
        color: #fff;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .machine:hover, .machine:active { transform: translateY(-6px) scale(1.03); }

      .machine .emoji { font-size: 2.6rem; line-height: 1; }
      .machine .nm { margin-top: 14px; font-size: 0.85rem; line-height: 1.5; }
      .machine .go {
        display: inline-block;
        margin-top: 16px;
        font-size: 0.55rem;
        padding: 9px 14px;
        border-radius: 10px;
        color: #140a1e;
        background: #fff;
      }

      /* neon — plant = mint, zombie = purple */
      .machine.plant {
        border: 3px solid var(--mint);
        box-shadow: 0 0 16px var(--mint), inset 0 0 16px rgba(124, 252, 0, 0.25);
      }
      .machine.plant:hover { box-shadow: 0 0 28px var(--mint), inset 0 0 18px rgba(124, 252, 0, 0.35); }
      .machine.plant .nm { color: #d6ffb0; text-shadow: 0 0 10px var(--mint); }
      .machine.plant .go { background: var(--mint); }

      .machine.zombie {
        border: 3px solid var(--purple);
        box-shadow: 0 0 16px var(--purple), inset 0 0 16px rgba(192, 139, 255, 0.25);
      }
      .machine.zombie:hover { box-shadow: 0 0 28px var(--purple), inset 0 0 18px rgba(192, 139, 255, 0.4); }
      .machine.zombie .nm { color: #ecd9ff; text-shadow: 0 0 10px var(--purple); }
      .machine.zombie .go { background: var(--purple); }

      .machine.fruit {
        border: 3px solid var(--cyan);
        box-shadow: 0 0 16px var(--cyan), inset 0 0 16px rgba(94, 241, 255, 0.25);
      }
      .machine.fruit:hover { box-shadow: 0 0 28px var(--cyan), inset 0 0 18px rgba(94, 241, 255, 0.4); }
      .machine.fruit .nm { color: #d6fbff; text-shadow: 0 0 10px var(--cyan); }
      .machine.fruit .go { background: var(--cyan); }

      @media (max-width: 560px) {
        .machine { width: 78vw; max-width: 320px; }
      }
    </style>
  </head>
  <body>
    <main class="arcade">
      <div class="pick">&#9654; INSERT COIN &mdash; PICK A MACHINE</div>

      <div class="machines">
        <!-- Kitty Plant -->
        <a class="machine plant" href="Kitty-Plant/pages/index.html">
          <div class="emoji">&#127811;&#128049;</div>
          <div class="nm">KITTY PLANT</div>
          <span class="go">&#9654; PLAY</span>
        </a>

        <!-- Kitty vs Zombie -->
        <a class="machine zombie" href="Kitty-zombie-3d/pages/start.html">
          <div class="emoji">&#128049;&#129482;</div>
          <div class="nm">KITTY VS ZOMBIE</div>
          <span class="go">&#9654; PLAY</span>
        </a>

        <!-- Fruit Merge -->
        <a class="machine fruit" href="Fruit-Merge/pages/game.html">
          <div class="emoji">&#127827;&#127819;</div>
          <div class="nm">FRUIT MERGE</div>
          <span class="go">&#9654; PLAY</span>
        </a>
      </div>
    </main>
  </body>
</html>
