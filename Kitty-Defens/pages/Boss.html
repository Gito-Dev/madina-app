<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kitty Madina Boss Battle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/game.css" />
    <style>
      /* Boss arena uses the haunted 3-lane map (tuned to mini-boss-map.webp) */
      .battlefield {
        background-image: url("../assets/Boss-ryuk/mini-boss-map.webp");
      }
      :root {
        --field-left: 21.5%;
        --field-top: 24%;
        --field-width: 56%;
        --field-height: 54%;
        --field-shift: 6px;
      }
    </style>
  </head>
  <body class="boss-mode">
    <!-- Full-screen map -->
    <div class="battlefield"></div>

    <!-- Ambient purple glow (bottom + sides), pulses in now and then -->
    <div class="boss-ambience"></div>

    <!-- Top HUD -->
    <div class="hud">
      <div class="pill">
        <svg class="ic" viewBox="0 0 24 24" width="18" height="18">
          <path
            fill="#ffce3d"
            stroke="#e0a400"
            stroke-width="1.3"
            stroke-linejoin="round"
            d="M12 2.5l2.9 5.9 6.5.95-4.7 4.6 1.1 6.45L12 17.9 6.2 20.9l1.1-6.45-4.7-4.6 6.5-.95z"
          />
        </svg>
        <span id="stars">425</span>
      </div>
      <div class="pill boss-pill">&#9760; BOSS BATTLE</div>
      <div class="spacer"></div>
      <div class="pill">
        <svg class="ic" viewBox="0 0 24 24" width="17" height="17">
          <path
            fill="#ffce3d"
            stroke="#e0a400"
            stroke-width="1.1"
            stroke-linejoin="round"
            d="M7 3h10v3a5 5 0 0 1-10 0zM7 4H3v2a4 4 0 0 0 4 4M17 4h4v2a4 4 0 0 1-4 4M10 11h4v3h-4zM8 20l1-4h6l1 4z"
          />
        </svg>
        <span id="score">0</span>
      </div>
      <button class="btn-mini" id="startBtn">Summon Boss</button>
      <button class="btn-mini" id="upgBtn">&#9876;&#65039; Upgrade</button>
      <button class="btn-mini" id="pauseBtn">Pause</button>
      <a class="btn-mini" href="index.html" style="text-decoration: none"
        >Menu</a
      >
    </div>

    <!-- Playfield over the map lanes -->
    <div class="field" id="field">
      <div class="grid" id="grid"></div>
      <div class="layer" id="layer"></div>
    </div>

    <!-- Shop (bottom) -->
    <div class="shop" id="shop"></div>

    <!-- Placement ghost -->
    <div class="ghost" id="ghost"><img alt="" /></div>

    <!-- Wave / warning banner -->
    <div class="banner" id="banner"></div>

    <!-- In-game upgrade overlay -->
    <div class="upg-overlay" id="upgOverlay">
      <div class="upg-modal">
        <button class="upg-close" id="upgClose">&times;</button>
        <h2 class="upg-title">&#9876;&#65039; Upgrades</h2>
        <div class="upg-sub">
          Spend <span class="gold">&#11088; stars</span> to power up your towers
        </div>
        <div class="upg-list" id="upgList"></div>
        <p class="upg-foot">
          Upgrades last for this battle. Press <b>U</b> to toggle.
        </p>
      </div>
    </div>

    <!-- Pause overlay -->
    <div class="pause-overlay" id="pauseOverlay">
      <div class="box">
        <h2>Paused</h2>
        <div class="row">
          <button class="pbtn" id="resumeBtn">Resume</button>
          <a class="pbtn alt" href="index.html">Quit</a>
        </div>
      </div>
    </div>

    <!-- Boss-battle result overlay -->
    <div class="boss-result" id="bossResult">
      <div class="box">
        <div class="emoji" id="brEmoji"></div>
        <h2 id="brTitle"></h2>
        <p id="brSub"></p>
        <div class="row">
          <button class="pbtn" id="brRetry">Retry</button>
          <a class="pbtn alt" href="index.html">Menu</a>
        </div>
      </div>
    </div>

    <script src="../js/upgrades.js"></script>
    <script src="../js/boss.js"></script>
    <script src="../js/music.js"></script>
  </body>
</html>
